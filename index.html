<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KSeF · Faktury NN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@75..100,400..800&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        PLACEHOLDER_TO_REMOVE :root {
            --paper: #EDEFE9;
            --strip: #F7F8F4;
            --ink: #1B2A24;
            --line: #93A396;
            --line-soft: #C9D2C8;
            --stamp: #B5342C;
            --ok: #2E6B4F;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'Archivo', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html,
        body {
            height: 100%
        }

        body {
            background: var(--paper);
            color: var(--ink);
            font-family: var(--sans);
            display: flex;
            flex-direction: column;
            min-height: 100vh
        }

        /* ── nagłówek ── */
        header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 18px;
            padding: 18px 28px 0;
            border-bottom: 2px solid var(--ink);
            flex-wrap: wrap
        }

        header h1 {
            font-size: clamp(18px, 2vw, 24px);
            font-weight: 800;
            letter-spacing: .02em;
            font-stretch: 80%;
            text-transform: uppercase
        }

        header h1 span {
            color: var(--stamp)
        }

        .header-meta {
            display: flex;
            gap: 26px;
            flex-wrap: wrap;
            align-items: baseline
        }

        .hm {
            display: flex;
            flex-direction: column;
            gap: 2px
        }

        .hm label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .12em;
            opacity: .65;
            font-weight: 600
        }

        .hm input {
            font-family: var(--mono);
            font-size: 14px;
            color: var(--ink);
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--line);
            padding: 2px 0;
            width: 118px
        }

        .hm input:focus {
            outline: none;
            border-bottom: 2px solid var(--stamp)
        }

        .hm input.num {
            width: 64px
        }

        .hm input.rate {
            width: 82px
        }

        nav {
            display: flex;
            gap: 0;
            width: 100%;
            margin-top: 10px
        }

        nav button {
            font-family: var(--sans);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            background: transparent;
            color: var(--ink);
            border: none;
            border-bottom: 3px solid transparent;
            padding: 10px 18px;
            cursor: pointer;
            opacity: .55
        }

        nav button.active {
            opacity: 1;
            border-bottom-color: var(--stamp)
        }

        nav button:hover {
            opacity: 1
        }

        /* ── kolumny ── */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0
        }

        .col {
            border-right: 1px dashed var(--line);
            padding: 22px 24px 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: var(--strip);
            position: relative
        }

        .col:last-child {
            border-right: none
        }

        .col::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background-image: radial-gradient(circle at 6px 0, var(--paper) 4px, transparent 4px);
            background-size: 14px 6px;
            background-repeat: repeat-x
        }

        .tag {
            align-self: flex-start;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .14em;
            text-transform: uppercase;
            border: 1px solid var(--ink);
            padding: 3px 8px
        }

        .col h2 {
            font-size: 20px;
            font-weight: 800;
            font-stretch: 78%;
            line-height: 1.05
        }

        .entity {
            font-size: 11px;
            line-height: 1.5;
            opacity: .72;
            border-left: 2px solid var(--line-soft);
            padding-left: 10px;
            font-family: var(--mono)
        }

        .fv-nr {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 600;
            color: var(--stamp);
            letter-spacing: .03em;
            min-height: 18px
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .field label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .12em;
            font-weight: 600;
            opacity: .65
        }

        .field input {
            font-family: var(--mono);
            font-size: 22px;
            font-weight: 500;
            background: transparent;
            color: var(--ink);
            border: none;
            border-bottom: 1.5px solid var(--line);
            padding: 4px 0;
            width: 100%
        }

        .field input.small {
            font-size: 15px
        }

        .field input:focus {
            outline: none;
            border-bottom: 2px solid var(--stamp)
        }

        .field input:disabled {
            opacity: .55;
            border-bottom-style: dotted
        }

        .calc {
            margin-top: auto;
            font-family: var(--mono);
            font-size: 13px;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 3px 12px;
            padding-top: 12px;
            border-top: 1px solid var(--line-soft)
        }

        .calc dt {
            opacity: .6
        }

        .calc dd {
            text-align: right;
            font-weight: 500
        }

        .calc dd.brutto {
            font-weight: 600;
            font-size: 15px
        }

        .calc .zero {
            opacity: .3
        }

        .btn-row {
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .col button {
            font-family: var(--sans);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            border: none;
            padding: 11px 0;
            cursor: pointer;
            transition: background .12s
        }

        .b-approve {
            background: var(--ink);
            color: var(--strip)
        }

        .b-approve:hover {
            background: var(--stamp)
        }

        .b-approve.done {
            background: var(--ok);
            cursor: default
        }

        .b-dl {
            background: transparent;
            color: var(--ink);
            border: 1.5px solid var(--ink) !important
        }

        .b-dl:hover:not(:disabled) {
            background: var(--ink);
            color: var(--strip)
        }

        button:disabled {
            opacity: .35;
            cursor: default !important
        }

        .b-approve:disabled {
            background: var(--line-soft);
            color: var(--ink)
        }

        /* ── rejestr ── */
        #view-register {
            flex: 1;
            padding: 22px 28px;
            display: none
        }

        #view-register.show {
            display: block
        }

        #view-issue.hide {
            display: none
        }

        #view-register h2 {
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 14px
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--mono);
            font-size: 13px;
            background: var(--strip)
        }

        th {
            font-family: var(--sans);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .12em;
            font-weight: 700;
            text-align: left;
            padding: 9px 10px;
            border-bottom: 2px solid var(--ink)
        }

        th.r,
        td.r {
            text-align: right
        }

        td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--line-soft)
        }

        tr:hover td {
            background: #EFF2EC
        }

        td .mini {
            font-size: 11px;
            background: transparent;
            border: 1px solid var(--line);
            padding: 3px 8px;
            cursor: pointer;
            font-family: var(--sans);
            font-weight: 700;
            letter-spacing: .06em;
            text-transform: uppercase;
            margin-left: 6px
        }

        td .mini:hover {
            border-color: var(--stamp);
            color: var(--stamp)
        }

        tfoot td {
            font-weight: 600;
            border-top: 2px solid var(--ink);
            border-bottom: none
        }

        .empty {
            opacity: .5;
            font-family: var(--mono);
            font-size: 13px;
            padding: 30px 0
        }

        /* ── pasek sumy ── */
        footer {
            border-top: 2px solid var(--ink);
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap
        }

        .totals {
            font-family: var(--mono);
            font-size: 14px;
            display: flex;
            gap: 34px;
            flex-wrap: wrap
        }

        .totals b {
            font-weight: 600
        }

        .totals .lbl {
            font-family: var(--sans);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .12em;
            opacity: .6;
            display: block;
            font-weight: 600
        }

        #dl-all {
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 800;
            letter-spacing: .1em;
            text-transform: uppercase;
            background: var(--stamp);
            color: #fff;
            border: none;
            padding: 13px 26px;
            cursor: pointer;
            transform: rotate(-.6deg);
            box-shadow: 2px 2px 0 var(--ink)
        }

        #dl-all:hover:not(:disabled) {
            transform: rotate(0)
        }

        #dl-all:disabled {
            background: var(--line-soft);
            box-shadow: none;
            transform: none
        }

        /* ── ustawienia ── */
        #view-settings {
            flex: 1;
            padding: 22px 28px;
            display: none
        }

        #view-settings.show {
            display: block
        }

        #view-settings h2 {
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-bottom: 22px
        }

        .settings-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
            max-width: 480px
        }

        .settings-form .field input {
            font-size: 16px
        }

        .settings-warn {
            font-size: 12px;
            font-weight: 700;
            color: var(--stamp);
            border: 1.5px solid var(--stamp);
            padding: 8px 12px;
            font-family: var(--sans);
            letter-spacing: .03em
        }

        .settings-group-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .14em;
            opacity: .55;
            margin-bottom: -6px
        }

        .settings-form small {
            font-size: 10px;
            opacity: .6;
            font-weight: 400
        }

        nav button .badge {
            display: inline-block;
            background: var(--stamp);
            color: #fff;
            font-size: 9px;
            font-weight: 800;
            border-radius: 2px;
            padding: 1px 5px;
            margin-left: 5px;
            vertical-align: middle;
            letter-spacing: .06em
        }

        .nr-preview {
            font-family: var(--mono);
            font-size: 14px;
            font-weight: 600;
            color: var(--ok);
            padding: 2px 0;
            letter-spacing: .03em;
            display: block
        }

        .period-status {
            font-size: 11px;
            font-family: var(--mono);
            min-height: 16px;
            letter-spacing: .02em
        }

        .period-status.issued {
            color: var(--ok);
            font-weight: 600
        }

        .period-status.missing {
            color: var(--stamp);
            font-weight: 600
        }

        .hm input.prefix {
            width: 140px
        }

        @media (max-width:980px) {
            main {
                grid-template-columns: 1fr 1fr
            }

            .col {
                border-bottom: 1px dashed var(--line)
            }
        }

        @media (max-width:560px) {
            main {
                grid-template-columns: 1fr
            }
        }

        @media (prefers-reduced-motion:reduce) {
            * {
                transition: none !important
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Faktury <span>KSeF</span> · FA(3) · <span id="h-seller-name">Twoja Firma</span></h1>
        <div class="header-meta">
            <div class="hm"><label for="g-prefix">Prefiks FV</label><input id="g-prefix" type="text"
                    placeholder="FV/2026/" class="prefix"></div>
            <div class="hm"><label for="g-nextnr">Numer FV</label><input id="g-nextnr" type="number" min="1" class="num"
                    value="1"></div>
            <div class="hm"><label for="g-rate">stawka zł/h</label><input id="g-rate" class="rate" type="number"
                    step="0.01" placeholder="—"></div>
            <div class="hm"><label for="g-sale">data sprzedaży</label><input id="g-sale" type="date"></div>
            <div class="hm"><label for="g-issue">data wystawienia</label><input id="g-issue" type="date"></div>
            <div class="hm"><label for="g-due">termin płatności</label><input id="g-due" type="date"></div>
        </div>
        <nav>
            <button id="tab-issue" class="active">Wystawianie</button>
            <button id="tab-register">Rejestr zatwierdzonych</button>
            <button id="tab-settings">Ustawienia</button>
        </nav>
    </header>

    <main id="view-issue"></main>

    <section id="view-register">
        <h2>Rejestr zatwierdzonych faktur</h2>
        <div id="reg-body"></div>
    </section>

    <section id="view-settings">
        <h2>Ustawienia</h2>
        <div class="settings-form">
            <p class="settings-group-label">Dane sprzedawcy (Podmiot 1 w XML)</p>
            <div class="field">
                <label for="s-seller-name">Nazwa firmy / imię i nazwisko</label>
                <input id="s-seller-name" type="text" placeholder="np. Jan Kowalski">
            </div>
            <div class="field">
                <label for="s-seller-nip">NIP <small>(10 cyfr, bez kresek)</small></label>
                <input id="s-seller-nip" type="text" inputmode="numeric" maxlength="10" placeholder="1234567890">
            </div>
            <div class="field">
                <label for="s-seller-addr">Adres</label>
                <input id="s-seller-addr" type="text" placeholder="ul. Przykładowa 1 lok. 2 00-001 Warszawa">
            </div>
            <div class="field">
                <label for="s-seller-nrb">Numer rachunku bankowego NRB <small>(26 cyfr)</small></label>
                <input id="s-seller-nrb" type="text" inputmode="numeric" maxlength="26"
                    placeholder="26 cyfr bez spacji">
            </div>
            <div class="field">
                <label for="s-seller-city">Miasto wystawienia faktury</label>
                <input id="s-seller-city" type="text" placeholder="np. Warszawa">
            </div>
            <p id="s-warn" class="settings-warn" hidden>Uzupełnij wszystkie pola zanim wystawisz pierwszą fakturę.</p>
        </div>
    </section>

    <footer>
        <div class="totals">
            <span><span class="lbl">godziny</span><b id="t-h">0,00</b></span>
            <span><span class="lbl">netto</span><b id="t-n">0,00 zł</b></span>
            <span><span class="lbl">VAT 23%</span><b id="t-v">0,00 zł</b></span>
            <span><span class="lbl">brutto</span><b id="t-b">0,00 zł</b></span>
        </div>
        <button id="dl-all" disabled>Pobierz zatwierdzone XML</button>
    </footer>

    <script>
        "use strict";
        // ═══ dane stałe ═════════════════════════════════════════════
        const COMPANIES = [
            {
                key: "TUnZ", tag: "TUNŻ", nip: "5260305006", zam: "00347250",
                name: "NATIONALE-NEDERLANDEN TOWARZYSTWO UBEZPIECZEŃ NA ŻYCIE SPÓŁKA AKCYJNA",
                short: "Towarzystwo Ubezpieczeń na Życie S.A."
            },
            {
                key: "UF", tag: "UF", nip: "5262459239", zam: "00347255",
                name: "NATIONALE-NEDERLANDEN USŁUGI FINANSOWE SPÓŁKA Z OGRANICZONĄ ODPOWIEDZIALNOŚCIĄ",
                short: "Usługi Finansowe Sp. z o.o."
            },
            {
                key: "PTE", tag: "PTE", nip: "5262241523", zam: "00347242",
                name: "NATIONALE-NEDERLANDEN POWSZECHNE TOWARZYSTWO EMERYTALNE SPÓŁKA AKCYJNA",
                short: "Powszechne Towarzystwo Emerytalne S.A."
            },
            {
                key: "TU", tag: "TU", nip: "5252685595", zam: "00347235",
                name: "NATIONALE-NEDERLANDEN TOWARZYSTWO UBEZPIECZEŃ SPÓŁKA AKCYJNA",
                short: "Towarzystwo Ubezpieczeń S.A."
            }
        ];
        const SELLER = { nip: "7122925895", name: "Noordinarysites Grzegorz Marcinek", addr: "ul. Turkusowa 6 lok. 5 20-572 Lublin" };
        const BUYER_ADDR = "ul. Topiel 12 00-342 Warszawa";
        const NRB = "91114020040000340275505398";

        // ═══ persystencja: localStorage (ustawienia) ════════════════
        const LS = {
            get(k, def) { try { const v = localStorage.getItem("ksef." + k); return v === null ? def : v } catch (e) { return def } },
            set(k, v) { try { localStorage.setItem("ksef." + k, v) } catch (e) { } },
            del(k) { try { localStorage.removeItem("ksef." + k) } catch (e) { } }
        };

        // ═══ persystencja: IndexedDB (faktury) ══════════════════════
        let db = null;
        function openDb() {
            return new Promise((res, rej) => {
                const req = indexedDB.open("ksef", 1);
                req.onupgradeneeded = e => {
                    const d = e.target.result;
                    if (!d.objectStoreNames.contains("invoices")) {
                        const st = d.createObjectStore("invoices", { keyPath: "nr" });
                        st.createIndex("byCreated", "createdAt");
                    }
                };
                req.onsuccess = e => { db = e.target.result; res(db) };
                req.onerror = e => rej(e.target.error);
            });
        }
        function idbPut(rec) {
            return new Promise((res, rej) => {
                const tx = db.transaction("invoices", "readwrite");
                tx.objectStore("invoices").put(rec);
                tx.oncomplete = res; tx.onerror = e => rej(e.target.error);
            });
        }
        function idbAll() {
            return new Promise((res, rej) => {
                const tx = db.transaction("invoices", "readonly");
                const req = tx.objectStore("invoices").getAll();
                req.onsuccess = () => res(req.result || []); req.onerror = e => rej(e.target.error);
            });
        }
        function idbDel(nr) {
            return new Promise((res, rej) => {
                const tx = db.transaction("invoices", "readwrite");
                tx.objectStore("invoices").delete(nr);
                tx.oncomplete = res; tx.onerror = e => rej(e.target.error);
            });
        }

        // ═══ matematyka na groszach, ROUND_HALF_UP ══════════════════
        function halfUpDiv(a, b) { const q = Math.floor(a / b), r = a - q * b; return (r * 2 >= b) ? q + 1 : q }
        function calc(hoursCent, rateGr) {
            const netto = halfUpDiv(hoursCent * rateGr, 100);
            const vat = halfUpDiv(netto * 23, 100);
            return { netto, vat, brutto: netto + vat };
        }
        const fmtPL = gr => (gr / 100).toLocaleString("pl-PL", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const fmtDot = gr => (gr / 100).toFixed(2);

        // ═══ daty domyślne ══════════════════════════════════════════
        function isoLocal(d) {
            return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
        }
        const today = new Date();
        const lastPrev = new Date(today.getFullYear(), today.getMonth(), 0); // ostatni dzień poprz. mc
        const dueDefault = new Date(lastPrev); dueDefault.setDate(dueDefault.getDate() + 14);
        const elSale = document.getElementById("g-sale"),
            elIssue = document.getElementById("g-issue"),
            elDue = document.getElementById("g-due"),
            elRate = document.getElementById("g-rate"),
            elPrefix = document.getElementById("g-prefix"),
            elNextNr = document.getElementById("g-nextnr");
        elSale.value = isoLocal(lastPrev);
        elIssue.value = isoLocal(today);
        elDue.value = isoLocal(dueDefault);
        // data sprzedaży zmieniona ręcznie → termin przelicza się +14
        elSale.addEventListener("change", () => {
            if (!elSale.value) return;
            const d = new Date(elSale.value + "T12:00:00"); d.setDate(d.getDate() + 14);
            elDue.value = isoLocal(d);
            checkPeriodStatus();
        });

        // ═══ ustawienia z localStorage ══════════════════════════════
        const savedRate = LS.get("rate", null);
        if (savedRate) elRate.value = savedRate;
        elRate.addEventListener("input", () => { if (elRate.value) LS.set("rate", elRate.value) });
        // prefiks numeru FV
        elPrefix.value = LS.get("prefix", "FV/" + today.getFullYear() + "/");
        elPrefix.addEventListener("input", () => { LS.set("prefix", elPrefix.value); updateNextNr(); });
        // oblicz następny numer na podstawie IDB (ostatnia nieusunięta zatwierdzona + 1)
        async function computeNextNr(prefix) {
            try {
                const all = await idbAll();
                const nums = all
                    .filter(r => r.nr.startsWith(prefix))
                    .map(r => { const n = parseInt(r.nr.slice(prefix.length), 10); return isNaN(n) ? NaN : n; })
                    .filter(n => !isNaN(n));
                return nums.length ? Math.max(...nums) + 1 : 1;
            } catch { return 1; }
        }
        async function updateNextNr() {
            const p = elPrefix.value.trim();
            if (!p) { elNextNr.value = 1; return; }
            // jeśli LS pamięta numer dla tego samego prefiksu, użyj go; inaczej policz z IDB
            const savedP = LS.get("nextNrPrefix", "");
            const savedN = parseInt(LS.get("nextNrVal", ""), 10);
            if (savedP === p && savedN > 0) { elNextNr.value = savedN; return; }
            const n = await computeNextNr(p);
            elNextNr.value = n;
            LS.set("nextNrPrefix", p);
            LS.set("nextNrVal", String(n));
        }
        // ręczna edycja numeru → zapisz do LS
        elNextNr.addEventListener("change", () => {
            const p = elPrefix.value.trim(), v = elNextNr.value;
            if (p && v) { LS.set("nextNrPrefix", p); LS.set("nextNrVal", v); }
        });
        // nazwa sprzedawcy (z ustawień, fallback do stałej)
        function getSellerName() { return LS.get("sellerName", "") || ""; }
        function getSellerNip() { return LS.get("sellerNip", "") || ""; }
        function getSellerAddr() { return LS.get("sellerAddr", "") || ""; }
        function getSellerNrb() { return LS.get("sellerNrb", "") || ""; }
        function getSellerCity() { return LS.get("sellerCity", "") || ""; }
        function checkSellerComplete() {
            const ok = getSellerName() && getSellerNip() && getSellerAddr() && getSellerNrb() && getSellerCity();
            document.getElementById("s-warn").hidden = !!ok;
            const badge = document.querySelector("#tab-settings .badge");
            if (!ok && !badge) {
                const b = document.createElement("span"); b.className = "badge"; b.textContent = "!";
                document.getElementById("tab-settings").appendChild(b);
            } else if (ok && badge) { badge.remove(); }
        }

        // ═══ budowa kolumn ══════════════════════════════════════════
        const colsEl = document.getElementById("view-issue");
        COMPANIES.forEach(c => {
            const el = document.createElement("section");
            el.className = "col";
            el.innerHTML = `
    <span class="tag">${c.tag}</span>
    <h2>Nationale-Nederlanden<br>${c.short}</h2>
    <div class="entity">NIP ${c.nip}<br>${BUYER_ADDR}</div>
    <div class="fv-nr" id="nr-${c.key}">FV —</div>
    <div class="period-status" id="ps-${c.key}"></div>
    <div class="field">
      <label for="h-${c.key}">Godziny</label>
      <input id="h-${c.key}" type="number" step="0.01" min="0" placeholder="0.00" inputmode="decimal">
    </div>
    <div class="field">
      <label for="z-${c.key}">Nr zamówienia</label>
      <input id="z-${c.key}" class="small" type="text" value="${LS.get("zam." + c.key, c.zam)}" pattern="\\d{8}" maxlength="8">
    </div>
    <dl class="calc">
      <dt>netto</dt><dd id="n-${c.key}" class="zero">0,00</dd>
      <dt>VAT 23%</dt><dd id="v-${c.key}" class="zero">0,00</dd>
      <dt>brutto</dt><dd id="b-${c.key}" class="brutto zero">0,00</dd>
    </dl>
    <div class="btn-row">
      <button class="b-approve" id="ap-${c.key}" disabled>Zatwierdź</button>
      <button class="b-dl" id="dl-${c.key}" disabled>Pobierz XML</button>
    </div>`;
            colsEl.appendChild(el);
            // draft godzin przeżywa odświeżenie strony
            const h = document.getElementById("h-" + c.key);
            const draft = LS.get("draft." + c.key, "");
            if (draft) h.value = draft;
            h.addEventListener("input", () => LS.set("draft." + c.key, h.value));
            document.getElementById("z-" + c.key).addEventListener("input", e => LS.set("zam." + c.key, e.target.value));
        });

        // stan zatwierdzenia w tej sesji: key -> rekord faktury
        const approved = {};

        function colState(c) {
            const raw = document.getElementById("h-" + c.key).value;
            const h = parseFloat(raw);
            const rateGr = Math.round(parseFloat(elRate.value || "0") * 100);
            if (!raw || isNaN(h) || h <= 0 || !rateGr) return null;
            const hoursCent = Math.round(h * 100);
            return { hoursCent, rateGr, ...calc(hoursCent, rateGr) };
        }

        function refresh() {
            let th = 0, tn = 0, tv = 0, tb = 0, anyApproved = false, nonApprovedIdx = 0;
            COMPANIES.forEach(c => {
                const rec = approved[c.key];
                const s = rec ? { hoursCent: rec.hoursCent, netto: rec.netto, vat: rec.vat, brutto: rec.brutto } : colState(c);
                const nrEl = document.getElementById("nr-" + c.key);
                const ap = document.getElementById("ap-" + c.key);
                const dl = document.getElementById("dl-" + c.key);
                ["n", "v", "b"].forEach(p => document.getElementById(p + "-" + c.key).classList.toggle("zero", !s));
                if (s) {
                    document.getElementById("n-" + c.key).textContent = fmtPL(s.netto);
                    document.getElementById("v-" + c.key).textContent = fmtPL(s.vat);
                    document.getElementById("b-" + c.key).textContent = fmtPL(s.brutto);
                    th += s.hoursCent; tn += s.netto; tv += s.vat; tb += s.brutto;
                } else {
                    ["n", "v", "b"].forEach(p => document.getElementById(p + "-" + c.key).textContent = "0,00");
                }
                if (rec) {
                    nrEl.textContent = "FV " + rec.nr;
                    ap.disabled = true; ap.classList.add("done"); ap.textContent = "Zatwierdzona ✓";
                    dl.disabled = false;
                    anyApproved = true;
                } else {
                    const p = elPrefix.value.trim(), n = parseInt(elNextNr.value, 10);
                    nrEl.textContent = (p && n > 0) ? "FV " + p + (n + nonApprovedIdx) : "FV — (ustaw prefiks i numer)";
                    nonApprovedIdx++;
                    ap.disabled = !s; ap.classList.remove("done"); ap.textContent = "Zatwierdź";
                    dl.disabled = true; dl.textContent = "Pobierz XML";
                }
            });
            document.getElementById("t-h").textContent = fmtPL(th);
            document.getElementById("t-n").textContent = fmtPL(tn) + " zł";
            document.getElementById("t-v").textContent = fmtPL(tv) + " zł";
            document.getElementById("t-b").textContent = fmtPL(tb) + " zł";
            document.getElementById("dl-all").disabled = !anyApproved;
        }
        document.addEventListener("input", refresh);

        // ═══ XML FA(3) ══════════════════════════════════════════════
        function esc(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") }
        function buildXml(rec) {
            const ts = new Date().toISOString().replace(/\.\d{3}Z$/, ".00000Z");
            return `<?xml version="1.0" encoding="utf-8"?><Faktura xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema" xmlns="http://crd.gov.pl/wzor/2025/06/25/13775/"><Naglowek><KodFormularza kodSystemowy="FA (3)" wersjaSchemy="1-0E">FA</KodFormularza><WariantFormularza>3</WariantFormularza><DataWytworzeniaFa>${ts}</DataWytworzeniaFa><SystemInfo>Aplikacja Podatnika KSeF</SystemInfo></Naglowek><Podmiot1><DaneIdentyfikacyjne><NIP>${getSellerNip()}</NIP><Nazwa>${esc(getSellerName())}</Nazwa></DaneIdentyfikacyjne><Adres><KodKraju>PL</KodKraju><AdresL1>${esc(getSellerAddr())}</AdresL1></Adres></Podmiot1><Podmiot2><DaneIdentyfikacyjne><NIP>${rec.nip}</NIP><Nazwa>${esc(rec.company)}</Nazwa></DaneIdentyfikacyjne><Adres><KodKraju>PL</KodKraju><AdresL1>${esc(BUYER_ADDR)}</AdresL1></Adres><JST>2</JST><GV>2</GV></Podmiot2><Fa><KodWaluty>PLN</KodWaluty><P_1>${rec.issueDate}</P_1><P_1M>${esc(getSellerCity())}</P_1M><P_2>${rec.nr}</P_2><P_6>${rec.saleDate}</P_6><P_13_1>${fmtDot(rec.netto)}</P_13_1><P_14_1>${fmtDot(rec.vat)}</P_14_1><P_15>${fmtDot(rec.brutto)}</P_15><Adnotacje><P_16>2</P_16><P_17>2</P_17><P_18>2</P_18><P_18A>2</P_18A><Zwolnienie><P_19N>1</P_19N></Zwolnienie><NoweSrodkiTransportu><P_22N>1</P_22N></NoweSrodkiTransportu><P_23>2</P_23><PMarzy><P_PMarzyN>1</P_PMarzyN></PMarzy></Adnotacje><RodzajFaktury>VAT</RodzajFaktury><FaWiersz><NrWierszaFa>1</NrWierszaFa><P_7>Prace dewelopera</P_7><P_8A>godzina</P_8A><P_8B>${(rec.hoursCent / 100).toFixed(2)}</P_8B><P_9A>${(rec.rateGr / 100).toFixed(2)}</P_9A><P_11>${fmtDot(rec.netto)}</P_11><P_12>23</P_12></FaWiersz><Platnosc><TerminPlatnosci><Termin>${rec.dueDate}</Termin></TerminPlatnosci><FormaPlatnosci>6</FormaPlatnosci><RachunekBankowy><NrRB>${getSellerNrb()}</NrRB></RachunekBankowy></Platnosc><WarunkiTransakcji><Zamowienia><NrZamowienia>${rec.zam}</NrZamowienia></Zamowienia></WarunkiTransakcji></Fa></Faktura>`;
        }
        function download(name, content) {
            const blob = new Blob([content], { type: "application/xml" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob); a.download = name;
            document.body.appendChild(a); a.click(); a.remove();
            setTimeout(() => URL.revokeObjectURL(a.href), 4000);
        }
        const fname = rec => `Wersja_robocza_${rec.nr.replace("/", "_")}_NN_${rec.key}.xml`;

        // ═══ zatwierdzanie ══════════════════════════════════════════
        async function approve(c) {
            const s = colState(c); if (!s) return;
            const zam = document.getElementById("z-" + c.key).value.trim();
            if (!/^\d{8}$/.test(zam)) { alert("Nr zamówienia musi mieć 8 cyfr."); return }
            if (!elSale.value || !elIssue.value || !elDue.value) { alert("Uzupełnij daty."); return }
            if (!getSellerName() || !getSellerNip() || !getSellerAddr() || !getSellerNrb() || !getSellerCity()) {
                alert("Uzupełnij dane sprzedawcy (Nazwa, NIP, Adres, NRB, Miasto) w zakładce Ustawienia."); showTab(tabSettings); return;
            }
            const prefix = elPrefix.value.trim();
            if (!prefix) { alert("Podaj prefiks numeru FV w nagłówku (np. FV/2026/)."); return; }
            const nextNr = parseInt(elNextNr.value, 10);
            if (!nextNr || nextNr < 1) { alert("Podaj poprawny numer FV w nagłówku."); return; }
            const nr = prefix + nextNr;
            const rec = {
                nr, key: c.key, tag: c.tag, company: c.name, nip: c.nip, zam,
                hoursCent: s.hoursCent, rateGr: s.rateGr,
                netto: s.netto, vat: s.vat, brutto: s.brutto,
                saleDate: elSale.value, issueDate: elIssue.value, dueDate: elDue.value,
                createdAt: Date.now()
            };
            rec.xml = buildXml(rec);
            try {
                await idbPut(rec);
            } catch (e) {
                alert("Nie udało się zapisać do IndexedDB: " + e); return;
            }
            approved[c.key] = rec;
            elNextNr.value = nextNr + 1;
            LS.set("nextNrPrefix", prefix);
            LS.set("nextNrVal", String(nextNr + 1));
            LS.del("draft." + c.key);
            document.getElementById("h-" + c.key).disabled = true;
            checkPeriodStatus();
            refresh();
        }
        COMPANIES.forEach(c => {
            document.getElementById("ap-" + c.key).addEventListener("click", () => approve(c));
            document.getElementById("dl-" + c.key).addEventListener("click", e => {
                const rec = approved[c.key]; if (!rec) return;
                download(fname(rec), rec.xml);
                e.target.textContent = "Pobrano ✓";
            });
        });
        document.getElementById("dl-all").addEventListener("click", () => {
            Object.values(approved).forEach((rec, i) => {
                setTimeout(() => {
                    download(fname(rec), rec.xml);
                    document.getElementById("dl-" + rec.key).textContent = "Pobrano ✓";
                }, i * 350);
            });
        });

        // ═══ status okresu rozliczeniowego ══════════════════════════════
        const MONTHS_GEN = ["stycznia", "lutego", "marca", "kwietnia", "maja", "czerwca",
            "lipca", "sierpnia", "września", "października", "listopada", "grudnia"];
        async function checkPeriodStatus() {
            if (!elSale.value) return;
            const periodYM = elSale.value.slice(0, 7);
            const [py, pm] = periodYM.split("-").map(Number);
            const label = "za " + MONTHS_GEN[pm - 1] + " " + py;
            let list = [];
            try { list = await idbAll(); } catch { return; }
            let needRefresh = false;
            COMPANIES.forEach(c => {
                const el = document.getElementById("ps-" + c.key);
                if (!el) return;
                const found = list.find(r => r.key === c.key && r.saleDate.slice(0, 7) === periodYM);
                if (found) {
                    el.className = "period-status issued";
                    el.textContent = "✓ " + found.nr + " (" + label + ")";
                    // wczytaj dane do kolumny jak po zatwierdzeniu
                    if (!approved[c.key] || approved[c.key].nr !== found.nr) {
                        approved[c.key] = found;
                        const hEl = document.getElementById("h-" + c.key);
                        const zEl = document.getElementById("z-" + c.key);
                        if (hEl) { hEl.value = (found.hoursCent / 100).toFixed(2); hEl.disabled = true; }
                        if (zEl) { zEl.value = found.zam; zEl.disabled = true; }
                        needRefresh = true;
                    }
                } else {
                    el.className = "period-status missing";
                    el.textContent = "✗ brak FV " + label;
                    // odblokuj jeśli poprzedni okres był zatwierdzony
                    if (approved[c.key]) {
                        delete approved[c.key];
                        const hEl = document.getElementById("h-" + c.key);
                        const zEl = document.getElementById("z-" + c.key);
                        if (hEl) { hEl.value = LS.get("draft." + c.key, ""); hEl.disabled = false; }
                        if (zEl) { zEl.disabled = false; }
                        needRefresh = true;
                    }
                }
            });
            if (needRefresh) refresh();
        }
        const tabIssue = document.getElementById("tab-issue"),
            tabReg = document.getElementById("tab-register"),
            tabSettings = document.getElementById("tab-settings"),
            viewIssue = document.getElementById("view-issue"),
            viewReg = document.getElementById("view-register"),
            viewSettings = document.getElementById("view-settings");

        function showTab(active) {
            [tabIssue, tabReg, tabSettings].forEach(t => t.classList.toggle("active", t === active));
            viewIssue.classList.toggle("hide", active !== tabIssue);
            viewReg.classList.toggle("show", active === tabReg);
            viewSettings.classList.toggle("show", active === tabSettings);
        }
        tabIssue.addEventListener("click", () => showTab(tabIssue));
        tabReg.addEventListener("click", async () => { showTab(tabReg); renderRegister(); });
        tabSettings.addEventListener("click", () => showTab(tabSettings));

        // ═══ ustawienia: dane sprzedawcy ═════════════════════════════
        const elSellerName = document.getElementById("s-seller-name");
        const elSellerNip = document.getElementById("s-seller-nip");
        const elSellerAddr = document.getElementById("s-seller-addr");
        const elSellerNrb = document.getElementById("s-seller-nrb");
        const elSellerCity = document.getElementById("s-seller-city");
        elSellerName.value = LS.get("sellerName", "");
        elSellerNip.value = LS.get("sellerNip", "");
        elSellerAddr.value = LS.get("sellerAddr", "");
        elSellerNrb.value = LS.get("sellerNrb", "");
        elSellerCity.value = LS.get("sellerCity", "");
        document.getElementById("h-seller-name").textContent = getSellerName() || "Twoja Firma";
        elSellerName.addEventListener("input", () => {
            const v = elSellerName.value.trim(); LS.set("sellerName", v);
            document.getElementById("h-seller-name").textContent = v || "Twoja Firma";
            checkSellerComplete();
        });
        elSellerNip.addEventListener("input", () => { LS.set("sellerNip", elSellerNip.value.trim()); checkSellerComplete(); });
        elSellerAddr.addEventListener("input", () => { LS.set("sellerAddr", elSellerAddr.value.trim()); checkSellerComplete(); });
        elSellerNrb.addEventListener("input", () => { LS.set("sellerNrb", elSellerNrb.value.trim()); checkSellerComplete(); });
        elSellerCity.addEventListener("input", () => { LS.set("sellerCity", elSellerCity.value.trim()); checkSellerComplete(); });
        checkSellerComplete();
        async function renderRegister() {
            const body = document.getElementById("reg-body");
            let list = [];
            try { list = await idbAll() } catch (e) { body.innerHTML = `<p class="empty">Błąd odczytu IndexedDB: ${e}</p>`; return }
            if (!list.length) { body.innerHTML = `<p class="empty">Brak zatwierdzonych faktur. Wystaw pierwszą w zakładce Wystawianie.</p>`; return }
            // sortowanie: rok malejąco, numer malejąco
            list.sort((a, b) => {
                const [ya, na] = a.nr.split("/").map(Number), [yb, nb] = b.nr.split("/").map(Number);
                return yb - ya || nb - na;
            });
            let th = 0, tn = 0, tb = 0;
            const rows = list.map(r => {
                th += r.hoursCent; tn += r.netto; tb += r.brutto;
                return `<tr>
      <td><b>${r.nr}</b></td>
      <td>${r.tag}</td>
      <td>${r.issueDate}</td>
      <td>${r.saleDate}</td>
      <td>${r.zam}</td>
      <td class="r">${fmtPL(r.hoursCent)}</td>
      <td class="r">${fmtPL(r.netto)}</td>
      <td class="r">${fmtPL(r.brutto)}</td>
      <td class="r">
        <button class="mini" data-act="xml" data-nr="${r.nr}">XML</button>
        <button class="mini" data-act="del" data-nr="${r.nr}">Usuń</button>
      </td>
    </tr>`;
            }).join("");
            body.innerHTML = `<table>
    <thead><tr><th>FV</th><th>Spółka</th><th>Wystawiono</th><th>Sprzedaż</th><th>Zamówienie</th><th class="r">Godz.</th><th class="r">Netto</th><th class="r">Brutto</th><th class="r"></th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr><td colspan="5">RAZEM (${list.length} FV)</td><td class="r">${fmtPL(th)}</td><td class="r">${fmtPL(tn)}</td><td class="r">${fmtPL(tb)}</td><td></td></tr></tfoot>
  </table>`;
            body.querySelectorAll(".mini").forEach(b => b.addEventListener("click", async e => {
                const nr = e.target.dataset.nr;
                const rec = list.find(r => r.nr === nr); if (!rec) return;
                if (e.target.dataset.act === "xml") { download(fname(rec), rec.xml) }
                else {
                    if (!confirm(`Usunąć FV ${nr} z rejestru? Numeracja nie zostanie cofnięta.`)) return;
                    await idbDel(nr);
                    if (approved[rec.key] && approved[rec.key].nr === nr) delete approved[rec.key];
                    renderRegister(); refresh(); checkPeriodStatus();
                }
            }));
        }

        // ═══ start ══════════════════════════════════════════════════
        openDb().then(() => { refresh(); updateNextNr(); checkPeriodStatus(); }).catch(e => {
            alert("IndexedDB niedostępne w tej przeglądarce/trybie: " + e + "\nZatwierdzanie nie będzie działać.");
            refresh();
        });
    </script>
</body>

</html>
